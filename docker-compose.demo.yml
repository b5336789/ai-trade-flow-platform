# Demo deployment compose: runs the baked PRODUCTION images (no dev server, no
# bind mounts). NEXT_PUBLIC_* are build-time args (interpolated from .env).
# Used on the demo EC2:
#   docker compose -f docker-compose.demo.yml up -d --build
services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL}"
        NEXT_PUBLIC_API_TOKEN: "${NEXT_PUBLIC_API_TOKEN}"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

  # Caddy terminates HTTPS for the domain (auto Let's Encrypt) and reverse-proxies
  # /api + /health to the backend, everything else to the frontend (same origin).
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
