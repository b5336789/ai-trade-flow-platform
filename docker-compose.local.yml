# Local production-like deployment: baked frontend/backend images, no bind mounts,
# persistent local SQLite data, and container health checks.
#
# Usage:
#   cp .env.example .env
#   # Optional if 3000/8000 are already used:
#   # LOCAL_FRONTEND_PORT=3100
#   # LOCAL_BACKEND_PORT=8100
#   docker compose -f docker-compose.local.yml up -d --build
services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${LOCAL_BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/trade_flow.db
    volumes:
      - local_backend_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
        NEXT_PUBLIC_API_TOKEN: "${NEXT_PUBLIC_API_TOKEN:-}"
    ports:
      - "${LOCAL_FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  local_backend_data:
