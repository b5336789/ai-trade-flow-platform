# Local-development compose. Backend (FastAPI) + frontend (Next.js).
# Secrets are read from the project-root `.env` (copy from `.env.example`).
services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /code
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build: ./frontend
    command: npm run dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
